<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="430" viewBox="0 0 1400 430" role="img" aria-labelledby="title desc">
  <title id="title">Latticeward Labs</title>
  <desc id="desc">Ideas, Built Forward — a connected product team building thoughtful digital experiences.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050816"/>
      <stop offset="0.5" stop-color="#0b1230"/>
      <stop offset="1" stop-color="#071d27"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="0.52" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <radialGradient id="glowA">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity=".35"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB">
      <stop offset="0" stop-color="#22d3ee" stop-opacity=".28"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M52 0H0V52" fill="none" stroke="#9fb4d1" stroke-opacity=".07"/>
    </pattern>
  </defs>

  <rect width="1400" height="430" rx="28" fill="url(#bg)"/>
  <rect width="1400" height="430" rx="28" fill="url(#grid)"/>
  <circle cx="185" cy="70" r="300" fill="url(#glowA)"/>
  <circle cx="1190" cy="340" r="330" fill="url(#glowB)"/>

  <g opacity=".52" stroke="url(#brand)" stroke-width="2">
    <path d="M58 292L142 232 228 286 314 193 405 247 486 154"/>
    <path d="M930 112L1018 164 1106 94 1193 176 1284 120 1360 181"/>
    <path d="M965 326L1051 270 1139 337 1228 259 1324 307"/>
  </g>
  <g fill="#091229" stroke="url(#brand)" stroke-width="3" filter="url(#softGlow)">
    <circle cx="58" cy="292" r="8"/><circle cx="142" cy="232" r="8"/><circle cx="228" cy="286" r="8"/>
    <circle cx="314" cy="193" r="8"/><circle cx="405" cy="247" r="8"/><circle cx="486" cy="154" r="8"/>
    <circle cx="930" cy="112" r="7"/><circle cx="1018" cy="164" r="7"/><circle cx="1106" cy="94" r="7"/>
    <circle cx="1193" cy="176" r="7"/><circle cx="1284" cy="120" r="7"/><circle cx="1360" cy="181" r="7"/>
    <circle cx="965" cy="326" r="7"/><circle cx="1051" cy="270" r="7"/><circle cx="1139" cy="337" r="7"/>
    <circle cx="1228" cy="259" r="7"/><circle cx="1324" cy="307" r="7"/>
  </g>

  <g text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif">
    <text x="700" y="181" fill="#f8fafc" font-size="68" font-weight="800" letter-spacing="5">LATTICEWARD LABS</text>
    <rect x="454" y="211" width="492" height="3" rx="1.5" fill="url(#brand)"/>
    <text x="700" y="265" fill="#cbd5e1" font-size="28" font-weight="500" letter-spacing="7">IDEAS, BUILT FORWARD.</text>
    <text x="700" y="321" fill="#8da2c4" font-size="17" letter-spacing="3">PRODUCT • DESIGN • ENGINEERING</text>
  </g>

  <rect x="1.5" y="1.5" width="1397" height="427" rx="26.5" fill="none" stroke="url(#brand)" stroke-opacity=".45" stroke-width="3"/>
</svg>